name: PR Auto Review

on:
  pull_request:
    types: [opened, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  # 1) 포럼에 스레드 생성하고 thread_id 확보
  create-thread:
    runs-on: ubuntu-latest
    outputs:
      thread_id: ${{ steps.create.outputs.thread_id }}
    steps:
      - name: Create Discord forum thread
        id: create
        run: |
          RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d '{
              "thread_name": "[PR #${{ github.event.pull_request.number }}] ${{ github.event.pull_request.title }}",
              "content": "생성자: ${{ github.event.pull_request.user.login }}\n${{ github.event.pull_request.html_url }}"
            }' \
            "${{ secrets.DISCORD_WEBHOOK_URL }}?wait=true")
          THREAD_ID=$(echo "$RESPONSE" | jq -r '.channel_id')
          echo "thread_id=$THREAD_ID" >> "$GITHUB_OUTPUT"

  # 2) Claude code-review 실행 -> PR에 인라인 코멘트
  review:
    needs: create-thread
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    outputs:
      model: ${{ steps.selector.outputs.model }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 변경 파일 수에 따라 모델과 turn 동적 결정 (파일 많으면 opus + 더 많은 turn)
      - name: Select model by PR size
        id: selector
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CHANGED_FILES=$(gh pr view ${{ github.event.pull_request.number }} --json changedFiles -q '.changedFiles')
          echo "changed files: $CHANGED_FILES"
          if [ "$CHANGED_FILES" -gt 10 ]; then
            echo "model=claude-opus-4-7" >> "$GITHUB_OUTPUT"
            echo "max_turns=40" >> "$GITHUB_OUTPUT"
          else
            echo "model=claude-sonnet-4-6" >> "$GITHUB_OUTPUT"
            echo "max_turns=15" >> "$GITHUB_OUTPUT"
          fi

      - uses: anthropics/claude-code-action@v1
        continue-on-error: true
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          plugins: "code-review@claude-code-plugins"
          prompt: "/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }} --comment 리뷰 코멘트는 한글로 작성"
          claude_args: >-
            --max-turns ${{ steps.selector.outputs.max_turns }}
            --model ${{ steps.selector.outputs.model }}
            --allowedTools "Skill,Bash,Read,Grep,Glob,Edit,Write,TodoWrite,mcp__github_inline_comment__create_inline_comment"

  # 3) 리뷰 완료를 포럼 스레드에 댓글로 통지
  notify-thread:
    needs: [create-thread, review]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Comment on Discord thread
        run: |
          MODEL="${{ needs.review.outputs.model }}"
          if [ "${{ needs.review.result }}" = "success" ]; then
            MESSAGE="✅ 리뷰 완료 (모델: $MODEL)"
          else
            MESSAGE="⚠️ 리뷰 실패 (${{ needs.review.result }}, 모델: $MODEL)"
          fi
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"$MESSAGE\"}" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}?thread_id=${{ needs.create-thread.outputs.thread_id }}"
